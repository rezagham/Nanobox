<!DOCTYPE html>
<html lang="en">
<head>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {

      display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; color: var(--text); }

    .toolbar { background: var(--card-bg); padding: 16px 20px; border-radius: var(--radius);

    .toolbar input[type="text"], .toolbar select { padding: 10px 14px; border-radius: 10px;
      border: 1.5px solid var(--border); font-family: "DM Sans", sans-serif; font-size: 0.85rem;
      font-weight: 600; background: #fff; color: var(--text); outline: none; transition: border-color 0.2s; }
    .toolbar input[type="text"] { flex-grow: 1; min-width: 180px; }
    .toolbar input[type="text"]:focus, .toolbar select:focus { border-color: var(--blue); }
    .btn { padding: 10px 20px; border: none; border-radius: 10px; font-family: "DM Sans", sans-serif;
      font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-dark); transform: translateY(-1px); }
    .btn-dark { background: #202124; color: #fff; }
    .btn-dark:hover { background: #000; transform: translateY(-1px); }
    #counter { font-family: "DM Mono", monospace; font-size: 0.85rem; color: var(--muted); font-weight: 500; margin-bottom: 16px; }

      box-shadow: var(--shadow); border-radius: 24px; }

    .face { position: absolute; width: 100%; min-height: 460px; backface-visibility: hidden;
      padding: 52px 56px; border-radius: 24px; display: flex; flex-direction: column; }

      text-transform: uppercase; letter-spacing: 0.8px; color: var(--blue); font-family: "DM Mono", monospace; }
    .back .face-meta { color: rgba(255,255,255,0.7); }
    .speaker-badge { position: absolute; top: 18px; right: 22px; padding: 6px 12px; border-radius: 8px;
      background: #e8f0fe; color: var(--blue); font-weight: 700; font-size: 0.78rem;
      cursor: pointer; border: none; font-family: "DM Sans", sans-serif; }
    .edit-area { outline: none; border: 1.5px dashed transparent; border-radius: 8px;
      padding: 6px 8px; line-height: 1.65; transition: border-color 0.2s, background 0.2s; }
    .edit-area:focus { border-color: rgba(26,115,232,0.3); background: rgba(26,115,232,0.04); }
    .back .edit-area:focus { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
    #q-text { font-size: 1.3rem; font-weight: 700; color: var(--text); }
    #a-text { font-size: 0.95rem; }
    #a-text ul { padding-left: 20px; }
    #a-text li { margin-bottom: 10px; line-height: 1.6; }
    .controls { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: center; }
    #save-msg { margin-top: 14px; font-size: 0.8rem; font-weight: 600; color: var(--muted); height: 20px; text-align: center; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 20px; padding: 32px; width: 440px; max-width: 95vw;
      display: flex; flex-direction: column; gap: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.18); }
    .modal h3 { font-size: 1.1rem; font-weight: 800; }
    .modal label { font-size: 0.82rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .btn-green { background: var(--green); color: #fff; }
    .btn-green:hover { background: #2d9248; }
    .btn-red { background: var(--red); color: #fff; }
    .btn-red:hover { background: #c62828; }
    #setup-screen { position: fixed; inset: 0; background: linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);

    #setup-screen h2 { font-size: 1.6rem; font-weight: 800; text-align: center; }
    #setup-screen p { font-size: 0.9rem; opacity: 0.85; text-align: center; max-width: 500px; line-height: 1.6; }
    .setup-box { background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 16px; padding: 28px; width: 100%; max-width: 520px;

    .setup-box label { font-size: 0.8rem; font-weight: 700; opacity: 0.8; letter-spacing: 0.5px; }

      font-family: "DM Mono", monospace; font-size: 0.82rem; background: rgba(255,255,255,0.15); color: #fff; outline: none; }
    .setup-box input::placeholder { color: rgba(255,255,255,0.45); }
    .setup-box input:focus { background: rgba(255,255,255,0.22); }
    #connect-btn { background: #fff; color: var(--blue); padding: 13px; border: none;
      border-radius: 12px; font-family: "DM Sans", sans-serif; font-weight: 800;
      font-size: 0.95rem; cursor: pointer; transition: transform 0.15s; }
    #connect-btn:hover { transform: translateY(-2px); }
    #setup-error { color: #ffcdd2; font-size: 0.82rem; font-weight: 600; text-align: center; display: none; }
  </style>
</head>
<body>
<div id="setup-screen">
  <h2>🔥 Connect to Firebase</h2>
  <p>One-time setup. Your team only needs to do this once per browser.</p>
  <div class="setup-box">
    <label>API KEY</label>
    <input id="cfg-apiKey" placeholder="AIzaSy...">
    <label>PROJECT ID</label>
    <input id="cfg-projectId" placeholder="your-project-id">
    <label>APP ID</label>
    <input id="cfg-appId" placeholder="1:123456789:web:abcdef">
    <button id="connect-btn" onclick="connectFirebase()">Connect & Save →</button>
    <div id="setup-error"></div>
  </div>
  <p style="font-size:0.78rem;opacity:0.6;">Firebase → Project Settings → Your Apps → Web App → Config</p>
</div>

<div class="header">
  <h1>🌿 NanobOx Interview Master</h1>
  <div class="sync-status">
    <div class="dot" id="sync-dot"></div>
    <span id="sync-label">Connecting…</span>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="searchTerm" placeholder="🔍 Search questions…" oninput="applyFilters()">
  <select id="catFilter" onchange="applyFilters()"><option value="all">ALL CATEGORIES</option></select>
  <select id="speakerFilter" onchange="applyFilters()">
    <option value="all">ALL PERSONS</option>
    <option value="John (CEO)">John (CEO)</option>
    <option value="Mohammad (CTO)">Mohammad (CTO)</option>
    <option value="Jennifer (CSO)">Jennifer (CSO)</option>
  </select>
  <button class="btn btn-primary" onclick="showModal()">+ NEW CARD</button>
</div>

<div id="counter">— / —</div>

<div class="flashcard-wrap" id="card" onclick="this.classList.toggle('flipped')">
  <div class="flashcard-inner">
    <div class="face front">
      <div class="face-meta" id="f-cat"></div>
      <select id="speakerAssign" class="speaker-badge" onclick="event.stopPropagation()" onchange="updateSpeaker(this.value)">
        <option value="John (CEO)">John (CEO)</option>
        <option value="Mohammad (CTO)">Mohammad (CTO)</option>
        <option value="Jennifer (CSO)">Jennifer (CSO)</option>
      </select>
      <div id="q-text" class="edit-area" contenteditable="true" onclick="event.stopPropagation()" oninput="scheduleAutosave()"></div>
    </div>
    <div class="face back">
      <div class="face-meta" id="b-cat"></div>
      <div id="a-text" class="edit-area" contenteditable="true" onclick="event.stopPropagation()" oninput="scheduleAutosave()"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-dark" onclick="event.stopPropagation();prev()">← PREVIOUS</button>
  <button class="btn btn-dark" onclick="event.stopPropagation();next()">NEXT →</button>
  <button class="btn btn-primary" onclick="showModal()">+ ADD CARD</button>
</div>
<div id="save-msg"></div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Add New Question</h3>
    <label>Category</label>
    <select id="newCatDropdown"></select>
    <label>Question</label>
    <textarea id="newQ" placeholder="Enter question…"></textarea>
    <label>Assign To</label>
    <select id="newSpeaker">
      <option value="John (CEO)">John (CEO)</option>
      <option value="Mohammad (CTO)">Mohammad (CTO)</option>
      <option value="Jennifer (CSO)">Jennifer (CSO)</option>
    </select>
    <div class="modal-btns">
      <button class="btn btn-green" onclick="submitNewCard()">ADD CARD</button>
      <button class="btn btn-red" onclick="hideModal()">CANCEL</button>
    </div>
  </div>
</div>

<script type="module">

const SEED = [{"cat": "category_1_company_strategy", "speaker": "John (CEO)", "q": "What is the greatest challenge your company is currently facing?", "a": ["Scaling from TRL6 to TRL8 while maintaining consistent performance across crops and climates.", "Bridging pilot success to repeatable commercial deployments with standardised units.", "Securing manufacturing capacity without increasing unit cost or complexity."]}, {"cat": "category_1_company_strategy", "speaker": "John (CEO)", "q": "What is your long-term vision for the company?", "a": ["Become the global standard for oxygen-enhanced irrigation systems.", "Enable climate-resilient agriculture with lower inputs and higher yields.", "Deploy at scale across both controlled and open-field farming."]}, {"cat": "category_1_company_strategy", "speaker": "John (CEO)", "q": "How will your company shape or transform the market?", "a": ["Shift irrigation from passive delivery to active performance enhancement.", "Reduce dependency on fertilisers and chemical treatments.", "Enable data-driven optimisation of root-zone conditions."]}, {"cat": "category_1_company_strategy", "speaker": "John (CEO)", "q": "Why is this the right time to bring your solution to market?", "a": ["Rising fertiliser and energy costs create immediate ROI demand.", "Climate stress (heat/drought) is already reducing yields globally.", "Existing solutions are too costly or complex to scale widely."]}, {"cat": "category_1_company_strategy", "speaker": "John (CEO)", "q": "What is the history of your company and technology development?", "a": ["Originated from electrostriction research at UCD.", "Validated through lab testing followed by multi-crop field trials.", "Now transitioning from prototype to scalable product platform."]}, {"cat": "category_1_company_strategy", "speaker": "John (CEO)", "q": "What is your company's mission?", "a": ["Improve crop productivity while reducing resource inputs.", "Provide farmers with simple, reliable, plug-and-play technology.", "Drive sustainable agriculture without adding operational complexity."]}, {"cat": "category_1_company_strategy", "speaker": "John (CEO)", "q": "What key challenges or failures have you experienced in your entrepreneurial journey?", "a": ["Early prototypes lacked scalability and reliability in field conditions.", "Initial trials showed variability across crops requiring optimisation.", "Learned to focus on simplicity and robustness over technical complexity."]}, {"cat": "category_1_company_strategy", "speaker": "John (CEO)", "q": "What is your planned exit strategy?", "a": ["Target acquisition by major irrigation, ag-tech, or input companies.", "Build strategic partnerships to position for integration into existing systems.", "Achieve strong revenue growth to enable high-value exit within 5-7 years."]}, {"cat": "category_1_company_strategy", "speaker": "John (CEO)", "q": "Why is your company classified as deep-tech?", "a": ["Based on novel physics (electrostriction-driven nanobubble generation).", "Requires interdisciplinary integration (fluid dynamics, electrostatics, agronomy).", "Protected by IP and difficult to replicate without deep technical expertise."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "How big is the market?", "a": ["~€17B TAM in European irrigated horticulture, with global expansion potential.", "~€1B SAM in controlled environment agriculture (CEA).", "Initial €200M SOM focused on high-value crops with fast ROI."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "Is this a growing market?", "a": ["Driven by water scarcity, fertiliser cost increases, and climate stress.", "CEA and greenhouse sectors growing >10% annually.", "Regulatory pressure to reduce inputs accelerates adoption."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "What evidence do you have of demand?", "a": ["Multiple field trials with commercial growers across crops.", "Demonstrated ROI via fertiliser reduction and yield increase.", "Interest from large growers and pilot partners."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "What is your target market segment?", "a": ["High-value crops: leafy greens, berries, tomatoes.", "Controlled environments first (vertical farms, greenhouses).", "Later expansion to open-field irrigation."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "Who are your customers?", "a": ["Commercial growers seeking yield and cost optimisation.", "Greenhouse operators and vertical farming companies.", "Agri-tech integrators and irrigation system providers."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "How will you reach customers?", "a": ["Direct sales to early adopters in CEA.", "Partnerships with irrigation system integrators.", "Demonstration trials as conversion tools."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "What is your go-to-market strategy?", "a": ["Start with pilots -> convert to paid deployments.", "Leverage ROI-driven adoption rather than regulation.", "Scale through distribution and integration partners."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "What is your first target market?", "a": ["Controlled Environment Agriculture (CEA).", "Greenhouses with high input costs and fast cycles.", "Segments where ROI can be proven within one season."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "Why did you choose this market?", "a": ["Fastest adoption cycle and measurable ROI.", "Customers are already technology-driven.", "Lower barriers compared to open-field agriculture."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "Are customers ready for your solution?", "a": ["Yes-cost pressure makes ROI-driven solutions attractive.", "Farmers actively seeking input reduction solutions.", "Low integration complexity removes adoption barriers."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "What are the risks in market entry?", "a": ["Conservative adoption behaviour of farmers.", "Need for proof across multiple crops and regions.", "Competition from established players."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "How will you mitigate them?", "a": ["Demonstration trials with clear ROI evidence.", "Focus on plug-and-play integration.", "Partnering with trusted industry players."]}, {"cat": "category_2_market", "speaker": "John (CEO)", "q": "How will you scale in the market?", "a": ["Expand from CEA -> greenhouses -> open-field agriculture.", "Scale manufacturing to reduce unit cost.", "Build distribution partnerships for global reach."]}, {"cat": "category_3_usp", "speaker": "John (CEO)", "q": "What are your key differentiators?", "a": ["Only nanobubble system using electrostriction (no compressors, no membranes).", "~100x lower energy consumption (<1W/m3/h) than conventional systems.", "Delivers both higher performance and lower cost-removes trade-off."]}, {"cat": "category_3_usp", "speaker": "John (CEO)", "q": "Why would customers choose your solution over alternatives?", "a": ["ROI within one growing cycle due to fertiliser savings (30-50%).", "Plug-and-play integration with existing irrigation-no infrastructure change.", "Lower maintenance due to no moving parts or consumables."]}, {"cat": "category_3_usp", "speaker": "John (CEO)", "q": "What is your core value proposition?", "a": ["Increases yield (up to ~15-40%) while reducing inputs.", "Reduces fertiliser dependency without compromising crop quality.", "Improves resilience under heat and water stress conditions."]}, {"cat": "category_3_usp", "speaker": "John (CEO)", "q": "What makes your solution unique compared to competitors?", "a": ["Competitors rely on gas injection or cavitation-energy intensive and complex.", "Our system uses ambient air and electric field physics.", "Achieves higher nanobubble concentration at lower operating cost."]}, {"cat": "category_3_usp", "speaker": "John (CEO)", "q": "What is special about your technology that delivers value?", "a": ["Stable nanobubbles (10^8-10^9 nb/mL) improving oxygen availability.", "Enhances root-zone biology and nutrient transport mechanisms.", "Scalable design enabling deployment from small farms to large systems."]}, {"cat": "category_4_clients_lois", "speaker": "John (CEO)", "q": "Who are your current clients or users?", "a": ["Pilot users include commercial growers in controlled environment agriculture (leafy greens, tomatoes).", "Engagements with vertical farming operators and greenhouse producers.", "Early-stage collaboration with irrigation and ag-tech partners."]}, {"cat": "category_4_clients_lois", "speaker": "John (CEO)", "q": "Do you have Letters of Intent (LOIs) or commitments from customers?", "a": ["LOIs and pilot agreements with selected growers to validate performance in real conditions.", "Commitments linked to successful trial outcomes and ROI validation.", "Pipeline of prospective customers awaiting trial results before scaling."]}, {"cat": "category_4_clients_lois", "speaker": "John (CEO)", "q": "What concrete evidence supports customer interest in your solution?", "a": ["Field trials demonstrating yield gains and fertiliser reduction under real farm conditions.", "Repeat trials requested by growers after initial pilot success.", "Inbound interest driven by cost pressures and sustainability targets."]}, {"cat": "category_4_clients_lois", "speaker": "John (CEO)", "q": "Why would clients adopt your solution in practice?", "a": ["Adoption driven by clear ROI within one growing cycle.", "Plug-and-play integration avoids operational disruption.", "Addresses immediate pain points: fertiliser cost, yield variability, climate stress."]}, {"cat": "category_5_cap_table_investment", "speaker": "John (CEO)", "q": "What does your current cap table look like?", "a": ["Founders retain a controlling stake to ensure strategic alignment and speed of execution.", "Equity allocated to early investors and IP holders, with a clean structure for future rounds.", "Cap table designed to accommodate ESOP and future institutional investors without dilution shock."]}, {"cat": "category_5_cap_table_investment", "speaker": "John (CEO)", "q": "Who are your current investors and what strategic value do they bring?", "a": ["Current investors include early-stage backers aligned with deep-tech and agri-tech scaling.", "IP originating from UCD provides strong technical foundation and credibility.", "Investors contribute network access, technical validation, and follow-on funding potential."]}, {"cat": "category_5_cap_table_investment", "speaker": "John (CEO)", "q": "Do the founders retain majority ownership, and how is control structured?", "a": ["Founders maintain majority ownership and decision-making control.", "Governance structured to allow fast execution while incorporating investor oversight.", "Board composition balanced between founders and strategic advisors."]}, {"cat": "category_5_cap_table_investment", "speaker": "John (CEO)", "q": "Do you have an ESOP, and how is it designed to attract talent?", "a": ["ESOP pool established (~10-15%) to attract key hires in engineering and commercial roles.", "Used to secure talent in competitive deep-tech and agri-tech markets.", "Aligned with long-term value creation and retention."]}, {"cat": "category_5_cap_table_investment", "speaker": "John (CEO)", "q": "What is your current valuation and how is it justified?", "a": ["Valuation based on TRL6 validation, demonstrated ROI in trials, and scalable IP.", "Benchmarked against comparable agri-tech and climate-tech startups.", "Justified by cost-performance breakthrough and large addressable market."]}, {"cat": "category_5_cap_table_investment", "speaker": "John (CEO)", "q": "What is your overall funding strategy for the next 24-36 months?", "a": ["Raise staged funding aligned with TRL progression (TRL6 -> TRL8 -> TRL9).", "Combine EIC funding with private equity to de-risk scaling phase.", "Target follow-on round after commercial validation and initial revenues."]}, {"cat": "category_5_cap_table_investment", "speaker": "John (CEO)", "q": "What is the status of your fundraising (including committed and targeted amounts)?", "a": ["Partial funding secured from existing investors and grant applications.", "Targeting €1M co-investment and additional €4M equity over next phase.", "Active discussions with investors contingent on trial validation milestones."]}, {"cat": "category_5_cap_table_investment", "speaker": "John (CEO)", "q": "What are your investment milestones and triggers for the next round?", "a": ["Milestones include TRL8 demonstration, multi-site validation, and first commercial deployments.", "Revenue generation and unit economics validation trigger next round.", "Scalable manufacturing readiness as key investment inflection point."]}, {"cat": "category_5_cap_table_investment", "speaker": "John (CEO)", "q": "Who is expected to lead the next funding round?", "a": ["Expected lead from climate-tech or agri-tech focused VC funds.", "Strategic investors (irrigation/agri companies) as potential co-leads.", "Positioned to attract investors after de-risking technology and market adoption."]}, {"cat": "category_5_cap_table_investment", "speaker": "John (CEO)", "q": "What is your plan B if funding is delayed or partially secured?", "a": ["Prioritise revenue-generating pilots to extend runway.", "Adjust scaling speed while maintaining core development milestones.", "Seek alternative funding sources (grants, strategic partnerships)."]}, {"cat": "category_6_WPs", "speaker": "John (CEO)", "q": "What are the key work packages in your project?", "a": ["WP1: System optimisation and scale-up of nanobubble generation unit.", "WP2: Multi-site field trials across crops and environments.", "WP3: Product engineering and manufacturability design.", "WP4: Commercial validation and market deployment preparation."]}, {"cat": "category_6_WPs", "speaker": "John (CEO)", "q": "What are the objectives of each work package?", "a": ["WP1 focuses on improving efficiency, stability, and scalability of the core technology.", "WP2 validates agronomic performance across real-world conditions.", "WP3 ensures cost-effective, scalable product design.", "WP4 builds market readiness and customer validation."]}, {"cat": "category_6_WPs", "speaker": "John (CEO)", "q": "What are the key deliverables for each work package?", "a": ["Validated prototype ready for TRL8 deployment.", "Field trial reports with quantified yield and input reductions.", "Manufacturing-ready product design and BOM.", "Initial commercial contracts or deployment agreements."]}, {"cat": "category_6_WPs", "speaker": "John (CEO)", "q": "What are the KPIs used to measure success in each work package?", "a": ["Yield increase (%), fertiliser reduction (%), and energy consumption (<1W/m3/h).", "System reliability and uptime during trials.", "Cost per unit and scalability metrics.", "Conversion rate from trials to commercial adoption."]}, {"cat": "category_6_WPs", "speaker": "John (CEO)", "q": "How are the work packages interconnected?", "a": ["WP1 feeds optimised technology into WP2 trials.", "WP2 generates validation data for WP3 product refinement.", "WP3 enables scaling for WP4 commercialisation.", "WP4 provides feedback loop for continuous improvement."]}, {"cat": "category_6_WPs", "speaker": "John (CEO)", "q": "How will you ensure timely delivery of each work package?", "a": ["Defined milestones and timelines with monthly tracking.", "Regular technical and management reviews.", "Dedicated leads for each WP with accountability.", "Contingency buffers built into timelines."]}, {"cat": "category_6_WPs", "speaker": "John (CEO)", "q": "Who is responsible for each work package?", "a": ["Technical lead (Mohammed) for WP1 and WP3.", "Agronomy/validation lead (Jennifer) for WP2.", "Business/strategy lead (John) for WP4.", "Cross-functional coordination across all WPs."]}, {"cat": "category_6_WPs", "speaker": "John our cost structure evolve as you scale?", "a": ["Unit costs decrease with volume manufacturing and supply chain optimisation.", "Operational costs remain low due to minimal maintenance requirements.", "Scalable model supports expansion without proportional cost increase."]}, {"cat": "category_8_technology", "speaker": "Mohammad (CTO)", "q": "What is unique about your technology?", "a": ["Uses electrostriction-based nanobubble generation instead of mechanical or gas injection systems.", "No moving parts, no membranes, and no external gas supply required.", "Achieves significantly higher efficiency with lower operational complexity."]}, {"cat": "category_8_technology", "speaker": "Mohammad (CTO)", "q": "Why is your technology considered deep-tech?", "a": ["Based on novel physics (electric-field-induced nanobubble formation).", "Requires integration of electrostatics, fluid dynamics, and agronomy.", "Protected by IP and not easily replicated without deep technical expertise."]}, {"cat": "category_8_technology", "speaker": "Mohammad (CTO)", "q": "What are the key disruptive elements of your solution?", "a": ["Reduces energy consumption by ~100x compared to conventional systems.", "Eliminates dependency on pure oxygen or compressed gas infrastructure.", "Enables scalable deployment beyond high-tech farms."]}, {"cat": "category_8_technology", "speaker": "Mohammad (CTO)", "q": "What are the core innovative features of your technology?", "a": ["Generates high-density nanobubbles (10^8-10^9 nb/mL) using ambient air.", "Maintains stability of nanobubbles in water for extended periods.", "Enhances oxygen delivery directly at the root zone."]}, {"cat": "category_8_technology", "speaker": "Mohammad (CTO)", "q": "What is the scientific principle behind your solution?", "a": ["Electrostriction creates nanocavities in water under electric fields.", "These cavities trap gas molecules and form stable nanobubbles.", "Nanobubbles increase oxygen availability and reactivity in the root demark strategy supports market recognition and differentiation.", "Ensures protection of brand in key target markets."]}, {"cat": "category_9_IP", "speaker": "Mohammad (CTO)", "q": "What licensing agreements are currently in place?", "a": ["IP originating from UCD licensed exclusively to the company.", "Agreements ensure full commercial rights for deployment and scaling.", "Clear ownership structure avoids future legal ambiguity."]}, {"cat": "category_9_IP", "speaker": "Mohammad (CTO)", "q": "What proprietary know-how or trade secrets do you rely on?", "a": ["Device tuning parameters and system optimisation algorithms.", "Manufacturing processes and component configurations.", "Operational know-how from field trials and deployment."]}, {"cat": "category_9_IP", "speaker": "Mohammad (CTO)", "q": "How difficult is it for competitors to replicate your technology?", "a": ["Requires deep understanding of electrostatics and fluid dynamics integration.", "Not easily reverse-engineered due to system-level complexity.", "Competitors would need both IP access and experimental validation capability."]}, {"cat": "category_9_IP", "speaker": "Mohammad (CTO)", "q": "What is your plan for future IP development?", "a": ["Expand patent portfolio to cover new applications and improvements.", "File in key markets (EU, US, global agriculture regions).", "Protect incremental innovations arising from field deployment."]}, {"cat": "category_9_IP", "speaker": "Mohammad (CTO)", "q": "How do you manage IP across different jurisdictions?", "a": ["Prioritised filing in EU and US for core protection.", "Plan to extend to key agricultural markets globally.", "Use of international patent frameworks (PCT)."]}, {"cat": "category_9_IP", "speaker": "Mohammad (CTO)", "q": "What is the competitive IP landscape in your field?", "a": ["Most competitors focus on mechanical or gas-injection methods.", "Limited overlap due to different physical principles.", "Opportunity to dominate niche of low-energy nanobubble generation."]}, {"cat": "category_10_breakthrough", "speaker": "Mohammad (CTO)", "q": "Why is your solution considered a breakthrough rather than an incremental improvement?", "a": ["Changes the underlying physics of bubble generation from mechanical to electrostatic (electrostriction).", "Delivers both higher performance and lower cost simultaneously, removing traditional trade-offs.", "Enables deployment beyond niche high-tech farms into mainstream agriculture."]}, {"cat": "category_10_breakthrough", "speaker": "Mohammad (CTO)", "q": "How does your technology fundamentally differ from current state-of-the-art nanobubble systems?", "a": ["Conventional systems rely on cavitation or gas injection; ours uses electric-field-induced nanocavity formation.", "Eliminates compressors, membranes, and external oxygen supply.", "Produces stable nanobubbles at higher concentrations with lower energy input."]}, {"cat": "category_10_breakthrough", "speaker": "Mohammad (CTO)", "q": "What specific limitations of existing solutions does your technology overcome?", "a": ["Reduces energy consumption by ~100x compared to typical systems (~100W -> <1W/m3/h).", "Avoids fouling and maintenance issues associated with membranes and moving parts.", "Removes dependency on pure oxygen logistics and infrastructure."]}, {"cat": "category_10_breakthrough", "speaker": "Mohammad (CTO)", "q": "Why have existing competitors not achieved the same performance improvements?", "a": ["Incumbents are locked into legacy mechanical architectures and supply chains.", "Electrostriction requires different expertise (electrostatics + fluid dynamics integration).", "High R&D barrier and need for cross-disciplinary optimisation delayed similar breakthroughs."]}, {"cat": "category_10_breakthrough", "speaker": "Mohammad (CTO)", "q": "How does your cost-performance ratio compare to state-of-the-art systems?", "a": ["Lower CAPEX due to simpler hardware and no gas supply requirements.", "Lower OPEX due to minimal ical outcomes at significantly lower cost."]}, {"cat": "category_10_breakthrough", "speaker": "Mohammad (CTO)", "q": "What would prevent a large company from developing a similar solution?", "a": ["Requires deep understanding of electrostriction and system integration.", "Existing players would need to redesign core architecture, not just iterate.", "Time-to-market advantage combined with IP protection creates barrier."]}, {"cat": "category_10_breakthrough", "speaker": "Mohammad (CTO)", "q": "How does your innovation enable new applications that were previously not feasible?", "a": ["Makes nanobubbles viable for low-margin crops and open-field farming.", "Enables integration into standard irrigation without redesign.", "Opens applications in water treatment and aquaculture due to low cost."]}, {"cat": "category_11_field_trials", "speaker": "Mohammad (CTO)", "q": "Who are your field trial partners?", "a": ["Commercial growers in controlled environment agriculture (CEA) and greenhouse sectors.", "Pilot partners across multiple crops including leafy greens and tomatoes.", "Engagement with ag-tech and irrigation system collaborators."]}, {"cat": "category_11_field_trials", "speaker": "Mohammad (CTO)", "q": "What roles do your field trial partners play in the project?", "a": ["Provide real-world environments for validation and performance testing.", "Support installation, operation, and monitoring of systems.", "Offer feedback on usability and operational integration."]}, {"cat": "category_11_field_trials", "speaker": "Mohammad (CTO)", "q": "What types of environments are your trials conducted in?", "a": ["Trials conducted in vertical farms, greenhouses, and outdoor test sites.", "Coverage across different climates and irrigation systems.", "Includes both high-tech and mid-tech agricultural environments."]}, {"cat": "category_11_field_trials", "speaker": "Mohammad (CTO)", "q": "How do your partners support validation of your technology?", "a": ["Partners supply crop perf , "Mitigated through planning and redundancy."]}, {"cat": "category_17_tricky_F2F", "speaker": "John (CEO)", "q": "What are you most worried about right now as a founder?", "a": ["Execution risk in scaling from trials to market.", "Ensuring consistency across deployments.", "Maintaining speed while managing risk."]}];

let db, allCards = [], filtered = [], idx = 0, autosaveTimer = null;

window.addEventListener("DOMContentLoaded", () => {
  const cfg = loadConfig();
  if (cfg) { document.getElementById("setup-screen").style.display = "none"; initApp(cfg); }
});

window.connectFirebase = async function() {
  const cfg = {
    apiKey: document.getElementById("cfg-apiKey").value.trim(),
    projectId: document.getElementById("cfg-projectId").value.trim(),
    appId: document.getElementById("cfg-appId").value.trim(),
  };
  if (!cfg.apiKey || !cfg.projectId || !cfg.appId) return showSetupError("Fill in all fields.");
  try {
    await initApp(cfg, true);
    saveConfig(cfg);
    document.getElementById("setup-screen").style.display = "none";
  } catch(e) { showSetupError("Connection failed: " + e.message); }
};

function showSetupError(msg) {
  const el = document.getElementById("setup-error");
  el.style.display = "block"; el.textContent = "❌ " + msg;
}

async function initApp(cfg, isFirstTime = false) {
  const app = initializeApp({
    apiKey: cfg.apiKey,
    authDomain: cfg.projectId + ".firebaseapp.com",
    projectId: cfg.projectId,
    appId: cfg.appId,
  });
  db = getFirestore(app);
  setSyncStatus("saving", "Connecting…");
  const q = query(collection(db, "cards"), orderBy("createdAt"));
  onSnapshot(q, (snap) => {
    if (snap.empty && isFirstTime) { seedData(); return; }
    allCards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    setupCategories(); applyFilters(); setSyncStatus("live", "Live");
  }, (err) => { setSyncStatus("error", "Error"); console.error(err); });
}

async function seedData() {
  setSyncStatus("saving", "Loading all cards…");
  let t = Date.now();
  for (const card of SEED) {
    await addDoc(collection(db, "cards"), { ...card, createdAt: t++ });
  }
}

function setSyncStatus(state, label) {
  document.getElementById("sync-dot").className = "dot " + state;
  document.getElementById("sync-label").textContent = label;
}

function setupCategories() {
  const catFilter = document.getElementById("catFilter");
  const newCatDropdown = document.getElementById("newCatDropdown");
  const existing = [...catFilter.options].map(o => o.value);
  [...new Set(allCards.map(c => c.cat))].sort().forEach(cat => {
    if (!existing.includes(cat)) {
      [catFilter, newCatDropdown].forEach(sel => {
        const opt = document.createElement("option");
        opt.value = cat; opt.innerText = cat; sel.appendChild(opt);
      });
    }
  });
}

window.applyFilters = function() {
  const catVal = document.getElementById("catFilter").value;
  const speakerVal = document.getElementById("speakerFilter").value;
  const searchVal = document.getElementById("searchTerm").value.toLowerCase();
  filtered = allCards.filter(c =>
    (catVal === "all" || c.cat === catVal) &&
    (speakerVal === "all" || c.speaker === speakerVal) &&
    (c.q || "").toLowerCase().includes(searchVal)
  );
  idx = 0; update();
};

function update() {
  if (filtered.length === 0) {
    document.getElementById("q-text").innerText = "No cards found.";
    document.getElementById("a-text").innerHTML = "";
    document.getElementById("counter").innerText = "0 / 0"; return;
  }
  const c = filtered[idx];
  document.getElementById("card").classList.remove("flipped");
  document.getElementById("f-cat").innerText = c.cat || "";
  document.getElementById("b-cat").innerText = c.cat || "";
  document.getElementById("speakerAssign").value = c.speaker || "John (CEO)";
  document.getElementById("q-text").innerText = c.q || "";
  const bullets = Array.isArray(c.a) ? c.a : [];
  document.getElementById("a-text").innerHTML =
    "<ul>" + (bullets.length ? bullets.map(p => "<li>" + p + "</li>").join("") : "<li>New answer…</li>") + "</ul>";
  document.getElementById("counter").innerText = (idx + 1) + " / " + filtered.length;
}

window.next = function() { saveCurrentCard(); if (idx < filtered.length - 1) { idx++; update(); } };
window.prev = function() { saveCurrentCard(); if (idx > 0) { idx--; update(); } };
window.updateSpeaker = function(val) { if (filtered.length > 0) { filtered[idx].speaker = val; scheduleAutosave(); } };

window.scheduleAutosave = function() {
  clearTimeout(autosaveTimer);
  setSyncStatus("saving", "Saving…");
  autosaveTimer = setTimeout(() => saveCurrentCard(), 1200);
};

function saveCurrentCard() {
  if (!db || filtered.length === 0) return;
  const c = filtered[idx];
  c.q = document.getElementById("q-text").innerText.trim();
  const bullets = [];
  document.querySelectorAll("#a-text li").forEach(li => bullets.push(li.innerText.trim()));
  c.a = bullets;
  c.speaker = document.getElementById("speakerAssign").value;
  const { id, ...data } = c;
  setDoc(doc(db, "cards", id), data)
    .then(() => { setSyncStatus("live", "Saved ✓"); showSaveMsg("✅ Saved"); })
    .catch(e => { setSyncStatus("error", "Save failed"); showSaveMsg("❌ " + e.message); });
}

function showSaveMsg(msg) {
  const el = document.getElementById("save-msg");
  el.textContent = msg; clearTimeout(el._t);
  el._t = setTimeout(() => el.textContent = "", 2500);
}

window.showModal = function() { document.getElementById("addModal").classList.add("open"); };
window.hideModal = function() { document.getElementById("addModal").classList.remove("open"); };

window.submitNewCard = async function() {
  const q = document.getElementById("newQ").value.trim();
  if (!q) return alert("Enter a question.");
  await addDoc(collection(db, "cards"), {
    cat: document.getElementById("newCatDropdown").value,
    speaker: document.getElementById("newSpeaker").value,
    q, a: ["Draft answer…"], createdAt: Date.now()
  });
  document.getElementById("newQ").value = "";
  hideModal(); showSaveMsg("✅ Card added!");
};

function saveConfig(cfg) { localStorage.setItem("nanobox_fb_cfg", JSON.stringify(cfg)); }
function loadConfig() { try { return JSON.parse(localStorage.getItem("nanobox_fb_cfg")); } catch { return null; } }
</script>
</body>
</html>
